# ttsasr Docker Image Build and Push Workflow
# 自动构建 ttsasr Docker 镜像并推送到 Docker Hub 和阿里云镜像仓库

name: Build ttsasr Docker

on:
  push:
    tags:
      # 匹配 ttsasr-v 开头的标签，例如: ttsasr-v0.1.0
      - 'ttsasr-v*'
  workflow_dispatch:
    # 支持手动触发
    inputs:
      version:
        description: 'ttsasr version to build (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
      push_to_registry:
        description: 'Push to Docker registries'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: bytedesk/ttsasr
  ALIYUN_IMAGE_NAME: registry.cn-hangzhou.aliyuncs.com/bytedesk/ttsasr

jobs:
  build-and-push:
    name: Build and Push ttsasr Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # 从标签提取版本号，例如: ttsasr-v0.1.0 -> 0.1.0
            VERSION="${GITHUB_REF_NAME#ttsasr-v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building ttsasr version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: bytedesk
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          logout: false

      - name: Login to Aliyun Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}
          logout: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.ALIYUN_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ByteDesk ttsasr
            org.opencontainers.image.description=FunASR based HTTP ASR service for ByteDesk
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.vendor=ByteDesk
            maintainer=ByteDesk <270580156@qq.com>

      - name: Build and push to Aliyun Docker Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          tags: |
            ${{ env.ALIYUN_IMAGE_NAME }}:latest
            ${{ env.ALIYUN_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/ttsasr-v')
        uses: softprops/action-gh-release@v1
        with:
          name: ttsasr v${{ steps.version.outputs.VERSION }}
          body: |
            ## ttsasr Docker 镜像发布

            **版本**: ${{ steps.version.outputs.VERSION }}
            **基础镜像**: python:3.11-slim-bookworm

            ### Docker 镜像

            #### Docker Hub
            ```bash
            docker pull bytedesk/ttsasr:${{ steps.version.outputs.VERSION }}
            # 或者
            docker pull bytedesk/ttsasr:latest
            ```

            #### 阿里云镜像仓库（中国大陆用户推荐）
            ```bash
            docker pull registry.cn-hangzhou.aliyuncs.com/bytedesk/ttsasr:${{ steps.version.outputs.VERSION }}
            # 或者
            docker pull registry.cn-hangzhou.aliyuncs.com/bytedesk/ttsasr:latest
            ```

            ### 快速启动

            ```bash
            docker run --rm -p 8000:8000 bytedesk/ttsasr:${{ steps.version.outputs.VERSION }}
            ```

            ### 健康检查

            ```bash
            curl http://localhost:8000/health
            ```

            ### 相关链接

            - Docker Hub: https://hub.docker.com/r/bytedesk/ttsasr
            - 阿里云镜像: https://cr.console.aliyun.com/repository/cn-hangzhou/bytedesk/ttsasr

            ---

            **构建时间**: ${{ steps.meta.outputs.created }}
            **提交 SHA**: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## ttsasr Docker 镜像构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 镜像信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **平台**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **构建时间**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull bytedesk/ttsasr:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 阿里云镜像仓库" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull registry.cn-hangzhou.aliyuncs.com/bytedesk/ttsasr:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  test-image:
    name: Test ttsasr Docker Image
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event.inputs.push_to_registry != 'false'

    steps:
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#ttsasr-v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Pull and test Docker Hub image
        run: |
          echo "Testing Docker Hub image..."
          docker pull bytedesk/ttsasr:${{ steps.version.outputs.VERSION }}
          docker run --rm bytedesk/ttsasr:${{ steps.version.outputs.VERSION }} python -m py_compile app/main.py
          echo "OK: Docker Hub image import check passed"

      - name: Pull and test Aliyun image
        run: |
          echo "Testing Aliyun image..."
          docker pull registry.cn-hangzhou.aliyuncs.com/bytedesk/ttsasr:${{ steps.version.outputs.VERSION }}
          docker run --rm registry.cn-hangzhou.aliyuncs.com/bytedesk/ttsasr:${{ steps.version.outputs.VERSION }} python -m py_compile app/main.py
          echo "OK: Aliyun image import check passed"
