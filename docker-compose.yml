services:
  funasr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时是否下载模型（总开关），默认 true
        DOWNLOAD_MODELS_ON_BUILD: "true"
        # 是否下载 FunASR ASR 模型，默认 true
        FUNASR_DOWNLOAD_ON_BUILD: "true"
        # 是否下载 VoxCPM 模型（约 4.3GB），默认 false
        VOXCPM_DOWNLOAD_ON_BUILD: "false"
        # 是否下载 Qwen3-TTS 模型（约 3.6GB），默认 false
        QWEN_TTS_DOWNLOAD_ON_BUILD: "false"
    container_name: bytedesk-ttsasr
    ports:
      - "8000:8000"
    environment:
      # 运行设备: cpu 或 cuda
      FUNASR_DEVICE: cpu

      # 主模型 iic/SenseVoiceSmall、paraformer-zh
      FUNASR_MODEL: iic/SenseVoiceSmall

      # 可选子模型（VAD/标点/说话人分离）
      FUNASR_VAD_MODEL: fsmn-vad
      # FUNASR_PUNC_MODEL: ct-punc
      # FUNASR_SPK_MODEL: cam++
      FUNASR_PRELOAD: "false"

      # 模型来源（留空表示使用默认来源）
      # FUNASR_HUB: ""

      # 是否信任远端代码（仅在必要模型场景开启）
      FUNASR_TRUST_REMOTE_CODE: "false"

      # 是否禁用 FunASR 版本更新检查
      FUNASR_DISABLE_UPDATE: "true"

      # URL 音频下载最大字节数（默认 50MB）
      FUNASR_MAX_URL_FILE_SIZE: "52428800"

      # VoxCPM TTS 配置
      VOXCPM_MODEL: openbmb/VoxCPM2
      VOXCPM_SOURCE: modelscope
      VOXCPM_MODELSCOPE_MODEL: OpenBMB/VoxCPM2
      VOXCPM_DEVICE: cpu
      VOXCPM_LOAD_DENOISER: "false"
      VOXCPM_PRELOAD: "false"

      # Qwen3-TTS 配置
      QWEN_TTS_MODEL: Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice
      QWEN_TTS_SOURCE: modelscope
      QWEN_TTS_MODELSCOPE_MODEL: Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice
      QWEN_TTS_DEVICE_MAP: cpu
      QWEN_TTS_LANGUAGE: Auto
      QWEN_TTS_SPEAKER: Vivian
      QWEN_TTS_PRELOAD: "false"
      # 语音文件保存目录（留空则不保存到本地，建议挂载宿主机目录后再配置）
      # TTS_OUTPUT_DIR: /app/output
    restart: unless-stopped
